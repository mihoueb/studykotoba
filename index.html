<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>和語SRS</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#1a3a5c; --teal:#0e8a7a; --teal2:#1ab59e; --teal-l:#d0f0eb;
  --sun:#f5a623; --sun-l:#fff3d6; --red:#e05252; --red-l:#fde8e8;
  --grn:#3ab06a; --grn-l:#e0f7ea; --pur:#7c5cbf; --pur-l:#ede8f8;
  --bg1:#c8e8ff; --bg2:#e8f4fd; --bg3:#d4f0e8;
  --sh:0 6px 24px rgba(0,0,0,.12); --sh2:0 12px 40px rgba(0,0,0,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 40%,var(--bg3) 100%);min-height:100vh;color:var(--deep);overflow-x:hidden;}

/* ── SCREENS ── */
.scr{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:16px 16px 48px;position:relative;z-index:1;}
.scr.on{display:flex;}

/* ── HOME ── */
.logo{font-family:'Kaisei Decol',serif;font-size:2.4rem;font-weight:700;text-align:center;margin-top:28px;line-height:1.15;text-shadow:0 2px 8px rgba(0,0,0,.1);}
.logo span{color:var(--teal);}
.tagline{color:var(--teal);font-size:.85rem;font-weight:700;margin:6px 0 20px;letter-spacing:.08em;}

/* streak */
.streak-box{background:linear-gradient(135deg,#ff6b35,#f5a623);color:white;border-radius:20px;padding:14px 28px;text-align:center;margin-bottom:18px;box-shadow:var(--sh2);position:relative;overflow:hidden;}
.streak-box::before{content:'🔥';position:absolute;font-size:4rem;right:-10px;top:-10px;opacity:.2;}
.streak-num{font-family:'Kaisei Decol',serif;font-size:2.8rem;font-weight:700;display:block;line-height:1;}
.streak-label{font-size:.78rem;font-weight:800;opacity:.9;letter-spacing:.05em;}

/* today card */
.today-card{background:white;border-radius:20px;padding:16px 20px;width:100%;max-width:400px;margin-bottom:14px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px;}
.today-icon{font-size:2rem;flex-shrink:0;}
.today-text{flex:1;}
.today-title{font-weight:800;font-size:1rem;color:var(--deep);}
.today-sub{font-size:.78rem;color:#888;margin-top:2px;}
.today-badge{background:var(--red);color:white;border-radius:20px;padding:4px 14px;font-size:.8rem;font-weight:800;flex-shrink:0;}
.today-badge.done{background:var(--grn);}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:400px;margin-bottom:16px;}
.stat-c{background:white;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:var(--sh);}
.stat-n{font-family:'Kaisei Decol',serif;font-size:1.6rem;font-weight:700;display:block;}
.stat-l{font-size:.6rem;font-weight:800;color:#aaa;margin-top:2px;}
.stat-c.c-grn .stat-n{color:var(--grn);}
.stat-c.c-sun .stat-n{color:var(--sun);}
.stat-c.c-red .stat-n{color:var(--red);}
.stat-c.c-pur .stat-n{color:var(--pur);}

/* menu */
.mbtn{width:100%;max-width:400px;padding:17px 20px;border:none;border-radius:18px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:1.05rem;font-weight:800;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);transition:transform .15s;text-align:left;color:white;}
.mbtn:active{transform:scale(.97);}
.mbtn .mi{font-size:1.6rem;flex-shrink:0;}
.mbtn .mt{flex:1;}
.mbtn .ma{font-size:1.1rem;opacity:.5;}
.mbtn .badge{background:rgba(255,255,255,.25);border-radius:12px;padding:2px 10px;font-size:.72rem;margin-right:4px;}
.m-srs{background:linear-gradient(135deg,#0e8a7a,#1ab59e);}
.m-quiz{background:linear-gradient(135deg,#f5a623,#f7c05a);}
.m-hard{background:linear-gradient(135deg,#e05252,#f07070);}
.m-stat{background:linear-gradient(135deg,#7c5cbf,#a07de0);}
.m-list{background:linear-gradient(135deg,#3a7bd5,#5a9be8);}

/* ── COMMON HEADER ── */
.hdr{width:100%;max-width:460px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.bk{background:white;border:none;border-radius:50%;width:42px;height:42px;font-size:1.1rem;cursor:pointer;box-shadow:var(--sh);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.bk:active{transform:scale(.9);}
.htitle{font-family:'Kaisei Decol',serif;font-size:1.25rem;font-weight:700;}
.hpill{margin-left:auto;background:white;border-radius:20px;padding:4px 14px;font-size:.76rem;font-weight:800;color:var(--deep);box-shadow:var(--sh);white-space:nowrap;}
.pbar{width:100%;max-width:460px;height:9px;background:rgba(255,255,255,.5);border-radius:9px;margin-bottom:16px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:9px;transition:width .4s;}

/* ── SRS CARD ── */
.card-wrap{width:100%;max-width:460px;perspective:1400px;height:250px;cursor:pointer;margin-bottom:16px;flex-shrink:0;}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.card-inner.flip{transform:rotateY(180deg);}
.cface{position:absolute;width:100%;height:100%;backface-visibility:hidden;background:white;border-radius:24px;box-shadow:var(--sh2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 20px;text-align:center;}
.cback{transform:rotateY(180deg);background:linear-gradient(135deg,#f0faf8,#e0f7ea);}
.ctag{font-size:.65rem;font-weight:800;letter-spacing:.12em;color:#bbb;margin-bottom:8px;text-transform:uppercase;}
.cword{font-family:'Kaisei Decol',serif;font-size:2.5rem;font-weight:700;color:var(--deep);line-height:1.1;margin-bottom:4px;}
.cread{font-size:.82rem;color:#bbb;margin-bottom:4px;}
.chint{font-size:.7rem;color:#ccc;margin-top:10px;}
.cmean{font-size:1.05rem;line-height:1.8;color:var(--deep);font-weight:700;margin-bottom:8px;}
.cex{font-size:.76rem;color:#666;line-height:1.7;border-left:3px solid var(--teal);padding-left:10px;text-align:left;width:100%;}
.cbadge{position:absolute;top:12px;right:14px;border-radius:11px;padding:3px 9px;font-size:.62rem;font-weight:800;}

/* SRS rating buttons */
.rating-hint{font-size:.7rem;color:#999;text-align:center;margin-bottom:8px;}
.rating-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:460px;margin-bottom:14px;}
.rbtn{padding:12px 6px;border:none;border-radius:14px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.75rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:var(--sh);transition:transform .15s;}
.rbtn:active{transform:scale(.94);}
.rbtn .ri{font-size:1.2rem;}
.rbtn .rint{font-size:.62rem;opacity:.75;margin-top:1px;}
.r0{background:var(--red-l);color:var(--red);}
.r1{background:#fff3e0;color:#e65100;}
.r2{background:var(--sun-l);color:var(--sun);}
.r3{background:var(--grn-l);color:var(--grn);}

.fc-nav{display:flex;gap:8px;width:100%;max-width:460px;}
.navbtn{flex:1;padding:13px;border:none;border-radius:13px;background:white;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.88rem;font-weight:800;color:var(--deep);cursor:pointer;box-shadow:var(--sh);transition:transform .15s;}
.navbtn:active{transform:scale(.95);}

/* ── QUIZ ── */
.qtype-row{display:flex;gap:7px;width:100%;max-width:460px;margin-bottom:13px;}
.qtbtn{flex:1;padding:9px 4px;border:2px solid rgba(255,255,255,.5);border-radius:12px;background:rgba(255,255,255,.4);font-family:'M PLUS Rounded 1c',sans-serif;font-size:.73rem;font-weight:800;cursor:pointer;color:var(--deep);transition:all .15s;}
.qtbtn.on{background:white;border-color:white;box-shadow:var(--sh);}
.qbox{width:100%;max-width:460px;background:white;border-radius:20px;padding:20px 18px;box-shadow:var(--sh2);margin-bottom:14px;min-height:115px;display:flex;flex-direction:column;justify-content:center;}
.qlbl{font-size:.68rem;font-weight:800;color:#bbb;letter-spacing:.1em;margin-bottom:8px;}
.qtxt{font-family:'Kaisei Decol',serif;font-size:1.5rem;font-weight:700;line-height:1.5;color:var(--deep);}
.qsub{font-size:.78rem;color:#888;margin-top:7px;line-height:1.6;}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:460px;margin-bottom:12px;}
.ch{padding:14px 12px;background:white;border:2px solid transparent;border-radius:15px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.85rem;font-weight:700;text-align:center;line-height:1.5;cursor:pointer;box-shadow:var(--sh);transition:all .15s;color:var(--deep);}
.ch:active{transform:scale(.96);}
.ch.ok{background:var(--grn-l);border-color:var(--grn);color:var(--grn);}
.ch.ng{background:var(--red-l);border-color:var(--red);color:var(--red);}
.fill-row{display:flex;gap:8px;width:100%;max-width:460px;margin-bottom:12px;}
.finp{flex:1;padding:13px;border:2px solid rgba(255,255,255,.8);border-radius:13px;background:white;font-family:'M PLUS Rounded 1c',sans-serif;font-size:1rem;font-weight:700;color:var(--deep);outline:none;box-shadow:var(--sh);}
.finp:focus{border-color:var(--teal);}
.fsub{padding:13px 18px;background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;border-radius:13px;color:white;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.88rem;font-weight:800;cursor:pointer;box-shadow:var(--sh);flex-shrink:0;}
.fb{width:100%;max-width:460px;padding:13px 16px;border-radius:15px;font-weight:800;font-size:.88rem;line-height:1.7;margin-bottom:11px;display:none;}
.fb.ok{background:var(--grn-l);color:var(--grn);}
.fb.ng{background:var(--red-l);color:var(--red);}
.nxtbtn{width:100%;max-width:460px;padding:16px;border:none;border-radius:15px;background:linear-gradient(135deg,var(--deep),#2a5080);color:white;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;box-shadow:var(--sh2);display:none;transition:transform .15s;}
.nxtbtn:active{transform:scale(.97);}

/* ── STATS SCREEN ── */
.acc-ring-wrap{width:100%;max-width:460px;display:flex;align-items:center;gap:20px;background:white;border-radius:20px;padding:20px;box-shadow:var(--sh);margin-bottom:14px;}
.ring-svg{width:100px;height:100px;flex-shrink:0;}
.ring-bg{fill:none;stroke:#eee;stroke-width:10;}
.ring-fg{fill:none;stroke:var(--teal);stroke-width:10;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .6s;}
.ring-txt{font-family:'Kaisei Decol',serif;font-size:.95rem;font-weight:700;fill:var(--deep);text-anchor:middle;dominant-baseline:middle;}
.acc-info{flex:1;}
.acc-big{font-family:'Kaisei Decol',serif;font-size:2rem;font-weight:700;color:var(--teal);}
.acc-label{font-size:.75rem;color:#888;font-weight:700;}
.acc-row{display:flex;gap:16px;margin-top:8px;}
.acc-sub{font-size:.8rem;color:#666;}
.acc-sub strong{color:var(--deep);}

.hist-title{width:100%;max-width:460px;font-family:'Kaisei Decol',serif;font-size:1rem;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid rgba(255,255,255,.6);}
.hist-bars{width:100%;max-width:460px;background:white;border-radius:16px;padding:16px;box-shadow:var(--sh);margin-bottom:14px;}
.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.hbar-label{font-size:.72rem;font-weight:700;width:28px;text-align:right;color:#888;flex-shrink:0;}
.hbar-track{flex:1;height:18px;background:#f0f0f0;border-radius:9px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:9px;transition:width .5s;}
.hbar-val{font-size:.7rem;font-weight:800;width:30px;color:var(--deep);flex-shrink:0;}

.due-list{width:100%;max-width:460px;}
.due-item{background:white;border-radius:14px;padding:12px 16px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;}
.due-word{font-family:'Kaisei Decol',serif;font-size:1rem;font-weight:700;flex:1;}
.due-when{font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:10px;}
.due-today{background:var(--red-l);color:var(--red);}
.due-soon{background:var(--sun-l);color:var(--sun);}
.due-later{background:var(--grn-l);color:var(--grn);}
.due-new{background:var(--pur-l);color:var(--pur);}

/* ── LIST ── */
.sinp{width:100%;max-width:460px;padding:12px 16px;border:none;border-radius:13px;background:white;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.92rem;color:var(--deep);outline:none;box-shadow:var(--sh);margin-bottom:11px;}
.flrow{display:flex;gap:6px;width:100%;max-width:460px;margin-bottom:11px;overflow-x:auto;padding-bottom:3px;}
.flrow::-webkit-scrollbar{height:3px;}
.flbtn{padding:6px 12px;border:2px solid rgba(255,255,255,.6);border-radius:16px;background:rgba(255,255,255,.4);font-family:'M PLUS Rounded 1c',sans-serif;font-size:.7rem;font-weight:800;cursor:pointer;white-space:nowrap;color:var(--deep);flex-shrink:0;}
.flbtn.on{background:white;border-color:white;box-shadow:var(--sh);}
.wcard{width:100%;max-width:460px;background:white;border-radius:15px;padding:13px 16px;margin-bottom:9px;box-shadow:var(--sh);display:flex;gap:11px;align-items:flex-start;}
.wi{font-size:1.2rem;flex-shrink:0;margin-top:2px;}
.ww{font-family:'Kaisei Decol',serif;font-size:1.1rem;font-weight:700;color:var(--deep);}
.wr{font-size:.68rem;color:#bbb;}
.wm{font-size:.8rem;color:#555;line-height:1.6;margin-top:3px;}
.wtags{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:9px;}
.tc{background:var(--teal-l);color:var(--teal);}
.tl{background:var(--sun-l);color:#b87000;}
.ts{background:var(--pur-l);color:var(--pur);}
.srs-bar-wrap{margin-top:5px;height:4px;background:#eee;border-radius:2px;width:100%;}
.srs-bar{height:100%;border-radius:2px;transition:width .4s;}

/* ── RESULT OVERLAY ── */
.rovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;}
.rovl.on{display:flex;}
.rcard{background:white;border-radius:28px;padding:32px 24px;text-align:center;max-width:300px;width:90%;box-shadow:var(--sh2);animation:popIn .4s cubic-bezier(.3,1.4,.5,1);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.remo{font-size:3.5rem;margin-bottom:10px;}
.rtit{font-family:'Kaisei Decol',serif;font-size:1.4rem;font-weight:700;margin-bottom:6px;}
.rsco{font-size:.92rem;color:#666;margin-bottom:16px;}
.rsco strong{color:var(--teal);font-size:1.4rem;}
.rbtn2{padding:12px 24px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--teal),var(--teal2));color:white;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.92rem;font-weight:800;cursor:pointer;box-shadow:var(--sh);margin:3px;}
.rbtn2.s{background:linear-gradient(135deg,var(--pur),#a07de0);}

/* ── TOAST / FX ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--deep);color:white;padding:11px 24px;border-radius:40px;font-size:.84rem;font-weight:800;box-shadow:var(--sh2);z-index:300;transition:transform .3s;white-space:nowrap;}
.toast.on{transform:translateX(-50%) translateY(0);}
@keyframes shoot{0%{transform:translateX(-120px) translateY(120px) rotate(-45deg);opacity:0}10%{opacity:1}100%{transform:translateX(450px) translateY(-450px) rotate(-45deg);opacity:0}}
.shoot{position:fixed;font-size:1.3rem;pointer-events:none;z-index:400;animation:shoot .85s forwards;}

/* stars bg */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;opacity:.14;animation:fs 12s infinite ease-in-out;}
@keyframes fs{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-16px) rotate(18deg)}}

@media(max-width:460px){.cgrid{grid-template-columns:1fr}.cword{font-size:2rem}.rating-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- ═══ HOME ═══ -->
<div class="scr on" id="s-home">
  <div class="logo">和語<span>SRS</span></div>
  <div class="tagline">✦ 忘却曲線に勝つ学習システム ✦</div>

  <div class="streak-box" style="width:100%;max-width:400px;margin-bottom:14px">
    <span class="streak-num" id="h-streak">0</span>
    <div class="streak-label">🔥 連続学習日数</div>
  </div>

  <div class="today-card" id="today-card">
    <div class="today-icon">📅</div>
    <div class="today-text">
      <div class="today-title" id="today-title">今日の復習</div>
      <div class="today-sub" id="today-sub">読み込み中…</div>
    </div>
    <div class="today-badge" id="today-badge">0語</div>
  </div>

  <div class="stat-grid">
    <div class="stat-c c-grn"><span class="stat-n" id="h-learned">0</span><div class="stat-l">⭐習得</div></div>
    <div class="stat-c c-sun"><span class="stat-n" id="h-review">0</span><div class="stat-l">📅復習中</div></div>
    <div class="stat-c c-red"><span class="stat-n" id="h-due">0</span><div class="stat-l">🔴期限</div></div>
    <div class="stat-c c-pur"><span class="stat-n" id="h-new">0</span><div class="stat-l">🆕未学習</div></div>
  </div>

  <button class="mbtn m-srs" onclick="goSRS()">
    <span class="mi">🧠</span>
    <div class="mt"><div>SRS復習セッション</div><div style="font-size:.72rem;opacity:.8;font-weight:400">今日期限の語句を賢く復習</div></div>
    <span class="badge" id="srs-badge">0語</span>
    <span class="ma">›</span>
  </button>
  <button class="mbtn m-quiz" onclick="goQuiz('all')">
    <span class="mi">📝</span>
    <div class="mt"><div>クイズに挑戦！</div><div style="font-size:.72rem;opacity:.8;font-weight:400">四択・穴埋め・意味あてで練習</div></div>
    <span class="ma">›</span>
  </button>
  <button class="mbtn m-hard" onclick="goHard()">
    <span class="mi">🔥</span>
    <div class="mt"><div>苦手集中練習</div><div style="font-size:.72rem;opacity:.8;font-weight:400">正答率の低い語句を特訓</div></div>
    <span class="badge" id="hard-badge">0語</span>
    <span class="ma">›</span>
  </button>
  <button class="mbtn m-stat" onclick="goStats()">
    <span class="mi">📊</span>
    <div class="mt"><div>学習統計・進捗</div><div style="font-size:.72rem;opacity:.8;font-weight:400">正答率グラフ・次回出題予定</div></div>
    <span class="ma">›</span>
  </button>
  <button class="mbtn m-list" onclick="goList()">
    <span class="mi">📖</span>
    <div class="mt"><div>語句いちらん</div><div style="font-size:.72rem;opacity:.8;font-weight:400">全語句・定着度を確認</div></div>
    <span class="ma">›</span>
  </button>
</div>

<!-- ═══ SRS SESSION ═══ -->
<div class="scr" id="s-srs">
  <div class="hdr"><button class="bk" onclick="goHome()">←</button><div class="htitle" id="srs-title">🧠 SRS復習</div><div class="hpill" id="srs-pill">0/0</div></div>
  <div class="pbar"><div class="pfill" id="srs-prog"></div></div>

  <div class="card-wrap" onclick="srsFlip()">
    <div class="card-inner" id="srs-ci">
      <div class="cface">
        <div class="cbadge" id="srs-badge2" style="background:var(--teal-l);color:var(--teal)"></div>
        <div class="ctag">語句</div>
        <div class="cword" id="srs-word">—</div>
        <div class="cread" id="srs-read"></div>
        <div class="cex" id="srs-ex-front" style="margin-top:10px"></div>
        <div class="chint">👆 タップして意味を見る</div>
      </div>
      <div class="cface cback">
        <div class="ctag">意味</div>
        <div class="cmean" id="srs-mean">—</div>

const seen=new Set(), WORDS=[];
for(const w of ALL){if(!seen.has(w.w)){seen.add(w.w);WORDS.push(w);}}

// ════════════════════════════════════════════════
// SM-2 SRS ENGINE
// ════════════════════════════════════════════════
// state[word] = { ef, interval, nextDue, reps, totalOk, totalNg, history:[] }
// ef = easiness factor (starts 2.5)
// interval = days until next review
// nextDue = Date.toDateString() of next review
// history = [{date, rating}]

const TODAY = new Date().toDateString();
let S = JSON.parse(localStorage.getItem('wago_srs_v1') || '{}');
let streak = parseInt(localStorage.getItem('wago_streak')||'0');
let lastDate = localStorage.getItem('wago_lastdate')||'';
let todayCount = parseInt(localStorage.getItem('wago_today_count')||'0');
let todayDate  = localStorage.getItem('wago_today_date')||'';

// streak update
if(lastDate !== TODAY){
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  if(lastDate === yesterday.toDateString()) streak++;
  else if(lastDate !== TODAY) streak = lastDate ? 0 : streak;
  // reset today count if new day
  if(todayDate !== TODAY){ todayCount=0; todayDate=TODAY; localStorage.setItem('wago_today_date',TODAY); localStorage.setItem('wago_today_count','0'); }
  lastDate=TODAY; localStorage.setItem('wago_lastdate',TODAY); localStorage.setItem('wago_streak',streak);
}

function getCard(w){ return S[w.w] || {ef:2.5,interval:0,nextDue:null,reps:0,totalOk:0,totalNg:0,history:[]}; }
function isDue(w){ const c=getCard(w); if(!c.nextDue) return true; return c.nextDue<=TODAY; }
function isNew(w){ return !S[w.w]; }

// SM-2 update
function sm2Update(w, rating){
  // rating: 0=blackout, 1=hard, 2=good, 3=easy
  let c = getCard(w);
  const q = [0,2,4,5][rating]; // map to SM-2 quality 0-5
  if(!c.history) c.history=[];
  c.history.push({date:TODAY, rating});

  if(q<3){
    // failed — reset
    c.reps=0; c.interval=1; c.totalNg++;
  } else {
    c.totalOk++;
    if(c.reps===0) c.interval=1;
    else if(c.reps===1) c.interval=6;
    else c.interval=Math.round(c.interval * c.ef);
    c.reps++;
    // update EF
    c.ef = Math.max(1.3, c.ef + 0.1 - (5-q)*(0.08+(5-q)*0.02));
  }
  const next = new Date(); next.setDate(next.getDate()+c.interval);
  c.nextDue = next.toDateString();
  S[w.w]=c;
  todayCount++; localStorage.setItem('wago_today_count',todayCount); localStorage.setItem('wago_today_date',TODAY);
  saveS();
}

function saveS(){ localStorage.setItem('wago_srs_v1',JSON.stringify(S)); }
function shuffle(a){ return a.sort(()=>Math.random()-.5); }

// ════════════════════════════════════════════════
// COMPUTED LISTS
// ════════════════════════════════════════════════
function getDue(){ return WORDS.filter(isDue); }
function getNew(){ return WORDS.filter(isNew); }
function getLearned(){ return WORDS.filter(w=>{ const c=S[w.w]; return c&&c.reps>=2&&c.interval>=6; }); }
function getHard(){ return WORDS.filter(w=>{ const c=S[w.w]; if(!c)return false; const tot=c.totalOk+c.totalNg; return tot>=3 && c.totalNg/tot>0.4; }); }
function accRate(){ let ok=0,ng=0; WORDS.forEach(w=>{ const c=S[w.w]; if(c){ok+=c.totalOk||0;ng+=c.totalNg||0;} }); return {ok,ng,pct:ok+ng>0?Math.round(ok/(ok+ng)*100):null}; }

let srsQ=[], srsIdx=0, srsFlipped_=false;

function goSRS(){
  const due=getDue();
  const nw=shuffle(getNew()).slice(0,Math.max(0,10-due.length));
  srsQ = shuffle([...due,...nw]);
  if(!srsQ.length){ showToast('今日の復習は完了！また明日ね😊'); return; }
  srsIdx=0; srsFlipped_=false;
  show('s-srs'); renderSRS();
}

function renderSRS(){
  if(srsIdx>=srsQ.length){ updateHome(); show('s-home'); showToast(`🎉 セッション完了！${srsQ.length}語学習したよ`); return; }
  const w=srsQ[srsIdx];
  const c=getCard(w);
  document.getElementById('srs-word').textContent=w.w;
  document.getElementById('srs-read').textContent=w.r?`（${w.r}）`:'';
  document.getElementById('srs-ex-front').textContent=w.ex?`例：${maskEx(w)}`:'';
  document.getElementById('srs-mean').textContent=w.m;
  document.getElementById('srs-ex').textContent=w.ex?`例：${w.ex}`:'';
  // badge
  const b=document.getElementById('srs-badge2');
  const tot=c.totalOk+c.totalNg;
  if(!S[w.w]){ b.textContent='🆕 NEW'; b.style.background='var(--pur-l)'; b.style.color='var(--pur)'; }
  else if(isDue(w)&&c.interval>0){ b.textContent=`📅 間隔${c.interval}日`; b.style.background='var(--sun-l)'; b.style.color='var(--sun)'; }
  else{ b.textContent=`✓ ${c.interval}日間隔`; b.style.background='var(--grn-l)'; b.style.color='var(--grn)'; }
  document.getElementById('srs-pill').textContent=`${srsIdx+1}/${srsQ.length}`;
  document.getElementById('srs-prog').style.width=`${(srsIdx/srsQ.length)*100}%`;
  // interval previews
  document.getElementById('r2-int').textContent=`${Math.round(Math.max(1,c.interval)*c.ef)}日後`;
  document.getElementById('r3-int').textContent=`${Math.round(Math.max(1,c.interval)*c.ef*1.3)}日後`;
  srsFlipped_=false;
  document.getElementById('srs-ci').classList.remove('flip');
  const rr=document.getElementById('rating-row');
  rr.style.opacity='0.4'; rr.style.pointerEvents='none';
  document.getElementById('rating-hint').style.opacity='0.4';
}

function srsFlip(){
  srsFlipped_=!srsFlipped_;
  document.getElementById('srs-ci').classList.toggle('flip',srsFlipped_);
  if(srsFlipped_){
    const rr=document.getElementById('rating-row');
    rr.style.opacity='1'; rr.style.pointerEvents='auto';
    document.getElementById('rating-hint').style.opacity='1';
  }
}

function srsRate(r){
  sm2Update(srsQ[srsIdx], r);
  if(r>=2) shootStar(r===3?'⭐':'✨');
  showToast(['😵 すぐ再出題','😓 1日後に出題','🤔 しばらくしたら出題','⭐ よく覚えてる！'][r]);
  setTimeout(()=>{ srsIdx++; renderSRS(); }, 500);
}

let qPool=[], qIdx=0, qType='choice', qOk=0, qAns=false, qMode='all';

function goQuiz(mode){
  qMode=mode;
  const pool = mode==='hard' ? getHard() : WORDS;
  if(pool.length<4){ showToast('語句が少なすぎます！'); return; }
  qPool=shuffle([...pool]); qIdx=0; qOk=0;
  document.getElementById('q-title').textContent=mode==='hard'?'🔥 苦手クイズ':'クイズ';
  renderQ(); show('s-quiz');
}
function goHard(){ goQuiz('hard'); }

function setQT(t,el){ qType=t; document.querySelectorAll('.qtbtn').forEach(b=>b.classList.remove('on')); el.classList.add('on'); qPool=shuffle([...qPool]); qIdx=0; qOk=0; renderQ(); }

function renderQ(){
  if(qIdx>=qPool.length){ showResult(); return; }
  qAns=false;
  const w=qPool[qIdx];
  document.getElementById('q-pill').textContent=`${qIdx+1}/${qPool.length}`;
  document.getElementById('q-prog').style.width=`${(qIdx/qPool.length)*100}%`;
  document.getElementById('fb').style.display='none';
  document.getElementById('nxtbtn').style.display='none';
  if(qType==='choice'){
    document.getElementById('qlbl').textContent='この意味の語句はどれ？';
    document.getElementById('qtxt').textContent=w.m;
    document.getElementById('qsub').textContent=w.ex?`例：${w.ex}`:'';
    document.getElementById('frow').style.display='none';
    renderChoices(mkChoices(w,'w'),w.w);
  } else if(qType==='fill'){
    document.getElementById('qlbl').textContent='この語句の意味は？（キーワードで）';
    document.getElementById('qtxt').textContent=w.w+(w.r?`（${w.r}）`:'');
    document.getElementById('qsub').textContent='';
    document.getElementById('cgrid').innerHTML='';
    document.getElementById('frow').style.display='flex';
    document.getElementById('finp').value=''; document.getElementById('finp').disabled=false;
    setTimeout(()=>document.getElementById('finp').focus(),80);
  } else {
    document.getElementById('qlbl').textContent='この語句の意味はどれ？';
    document.getElementById('qtxt').textContent=w.w+(w.r?`（${w.r}）`:'');
    document.getElementById('qsub').textContent='';
    document.getElementById('frow').style.display='none';
    renderChoices(mkChoices(w,'m'),w.m);
  }
}

function mkChoices(w,key){ const pool=WORDS.filter(x=>x[key]!==w[key]); return shuffle([w[key],...shuffle(pool).slice(0,3).map(x=>x[key])]); }
function maskEx(w){ if(!w.ex) return ''; return w.ex.replace(new RegExp(w.w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'＿＿＿'); }

function renderChoices(cs,correct){
  const g=document.getElementById('cgrid'); g.innerHTML='';
  cs.forEach(c=>{ const b=document.createElement('button'); b.className='ch'; b.textContent=c; b.onclick=()=>chkChoice(c,correct,b); g.appendChild(b); });
}

function chkChoice(sel,correct,btn){
  if(qAns)return; qAns=true;
  document.querySelectorAll('.ch').forEach(b=>{ b.disabled=true; if(b.textContent===correct)b.classList.add('ok'); });
  const ok=sel===correct;
  if(!ok)btn.classList.add('ng');
  markQ(qPool[qIdx],ok); if(ok){qOk++;shootStar('✨');}
  showFB(ok,correct); document.getElementById('nxtbtn').style.display='block';
}

function submitF(){
  if(qAns)return;
  const val=document.getElementById('finp').value.trim(); if(!val)return;
  qAns=true; document.getElementById('finp').disabled=true;
  const w=qPool[qIdx];
  const ok=w.m.includes(val)&&val.length>=2;
  markQ(w,ok); if(ok){qOk++;shootStar('✨');}
  showFB(ok,w.m); document.getElementById('nxtbtn').style.display='block';
}

function markQ(w,ok){
  // quizはSRSに軽く反映（ok:1点, ng:0点のrating）
  if(ok){ sm2Update(w,2); } else { sm2Update(w,0); }
}

function showFB(ok,ans){
  const fb=document.getElementById('fb');
  const w=qPool[qIdx];
  fb.className='fb '+(ok?'ok':'ng');
  fb.innerHTML=(ok?'⭐ 正解！すばらしい！':`😓 正解は「${ans}」だよ`)+(w.ex?`<div style="margin-top:6px;font-size:.8rem;opacity:.85;font-weight:400">例：${w.ex}</div>`:'');
  fb.style.display='block';
}
function nextQ(){ qIdx++; renderQ(); }

function showResult(){
  const pct=Math.round(qOk/qPool.length*100);
  document.getElementById('remo').textContent=pct>=80?'🏆':pct>=60?'⭐':'💪';
  document.getElementById('rtit').textContent=pct>=80?'すごい！！':pct>=60?'よくできました！':'もう一度がんばろう！';
  document.getElementById('rsco').innerHTML=`${qPool.length}問中 <strong>${qOk}問</strong> 正解（${pct}%）`;
  document.getElementById('rovl').classList.add('on');
  if(pct>=80) for(let i=0;i<6;i++) setTimeout(()=>shootStar(['🎉','⭐','🌟'][i%3]),i*180);
}
function closeResult(){ document.getElementById('rovl').classList.remove('on'); qPool=shuffle([...qPool]); qIdx=0; qOk=0; renderQ(); }

function goStats(){
  const {ok,ng,pct}=accRate();
  document.getElementById('acc-ok').textContent=ok;
  document.getElementById('acc-ng').textContent=ng;
  document.getElementById('acc-streak').textContent=streak;
  document.getElementById('acc-today').textContent=todayCount;
  if(pct!=null){
    document.getElementById('acc-big').textContent=pct+'%';
    document.getElementById('ring-txt').textContent=pct+'%';
    const circ=251.2, offset=circ*(1-pct/100);
    document.getElementById('ring-fg').style.strokeDashoffset=offset;
  } else {
    document.getElementById('acc-big').textContent='—';
    document.getElementById('ring-txt').textContent='—';
  }

  // level bars
  const lvls=['A1','A2','A3','A4','A5','A6','A7','A8','A9','A10','B1','B2','B3','B4'];
  const hb=document.getElementById('hist-bars'); hb.innerHTML='';
  lvls.forEach(lv=>{
    const ws=WORDS.filter(w=>w.lv===lv);
    let tok=0,tng=0;
    ws.forEach(w=>{ const c=S[w.w]; if(c){tok+=c.totalOk||0;tng+=c.totalNg||0;} });
    const tot=tok+tng; if(!tot)return;
    const p=Math.round(tok/tot*100);
    const col=p>=80?'var(--grn)':p>=60?'var(--sun)':'var(--red)';
    hb.innerHTML+=`<div class="hbar-row"><div class="hbar-label">${lv}</div><div class="hbar-track"><div class="hbar-fill" style="width:${p}%;background:${col}"></div></div><div class="hbar-val">${p}%</div></div>`;
  });
  if(!hb.innerHTML) hb.innerHTML='<div style="color:#aaa;font-size:.85rem;padding:8px">まだデータがありません</div>';

  // due schedule
  const dl=document.getElementById('due-list'); dl.innerHTML='';
  const sorted=[...WORDS].sort((a,b)=>{
    const ca=getCard(a), cb=getCard(b);
    if(!ca.nextDue && !cb.nextDue) return 0;
    if(!ca.nextDue) return -1;
    if(!cb.nextDue) return 1;
    return new Date(ca.nextDue)-new Date(cb.nextDue);
  }).slice(0,15);
  sorted.forEach(w=>{
    const c=getCard(w);
    let whenClass,whenText;
    if(!c.nextDue){ whenClass='due-new'; whenText='🆕 NEW'; }
    else if(c.nextDue<=TODAY){ whenClass='due-today'; whenText='🔴 今日！'; }
    else {
      const diff=Math.round((new Date(c.nextDue)-new Date(TODAY))/(1000*60*60*24));
      if(diff<=3){ whenClass='due-soon'; whenText=`⚡ ${diff}日後`; }
      else { whenClass='due-later'; whenText=`✓ ${diff}日後`; }
    }
    dl.innerHTML+=`<div class="due-item"><div class="due-word">${w.w}<span style="font-size:.7rem;color:#aaa;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:400"> ${w.m.slice(0,15)}…</span></div><div class="due-when ${whenClass}">${whenText}</div></div>`;
  });

  show('s-stats');
}

    else { const diff=Math.round((new Date(c.nextDue)-new Date(TODAY))/(1000*60*60*24)); dueStr=`📅${diff}日後`; }
    const d=document.createElement('div'); d.className='wcard';
    d.innerHTML=`<div class="wi">${icon}</div><div style="flex:1;min-width:0"><div class="ww">${w.w}</div><div class="wr">${w.r||''}</div><div class="wm">${w.m}</div><div class="wtags"><span class="tag tc">${w.cat}</span><span class="tag tl">Lv.${w.lv}</span>${pct!=null?`<span class="tag ts">正答${pct}%</span>`:''}<span class="tag" style="background:#f0f0f0;color:#888">${dueStr}</span></div><div class="srs-bar-wrap"><div class="srs-bar" style="width:${mastery}%;background:${barColor}"></div></div></div>`;
    el.appendChild(d);
  });
}

// filters
(()=>{
  const lvs=['all','A1','A2','A3','A4','A5','A6','A7','A8','A9','A10','B1','B2','B3','B4'];
  const r=document.getElementById('flrow');
  lvs.forEach(lv=>{
    const b=document.createElement('button'); b.className='flbtn'+(lv==='all'?' on':'');
    b.textContent=lv==='all'?'すべて':lv;
    b.onclick=()=>{ listLv=lv; document.querySelectorAll('.flbtn').forEach(x=>x.classList.remove('on')); b.classList.add('on'); renderList(); };
    r.appendChild(b);
  });
})();

// ════════════════════════════════════════════════
// FX
// ════════════════════════════════════════════════
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2200); }
function shootStar(e){ const s=document.createElement('div'); s.className='shoot'; s.textContent=e; s.style.left=Math.random()*60+20+'%'; s.style.top=Math.random()*40+30+'%'; document.body.appendChild(s); setTimeout(()=>s.remove(),900); }
(()=>{ const c=document.getElementById('stars'); ['✦','✧','⭐','🌟','✨'].forEach(e=>{ for(let i=0;i<3;i++){ const s=document.createElement('div'); s.className='star'; s.textContent=e; s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%'; s.style.fontSize=(12+Math.random()*10)+'px'; s.style.animationDelay=Math.random()*10+'s'; s.style.animationDuration=(8+Math.random()*8)+'s'; c.appendChild(s); } }); })();

// INIT
updateHome();
</script>
